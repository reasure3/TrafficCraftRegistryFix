modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="trafficcraft_registry_fix.png"
description='''
Fixes the duplicate damageable recipe type registration in TrafficCraft 1.2.0+3 on NeoForge 21.1.238.
'''

[[mixins]]
config="${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version}]"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="trafficcraft"
type="required"
reason="This patch targets TrafficCraft 1.2.0+3 only."
versionRange="[1.21.1-beta-1.2.0+3]"
ordering="NONE"
side="BOTH"
